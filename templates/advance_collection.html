{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Advance Collection Form</title>

    <link rel="stylesheet"
          href="{% static 'css/advance_collection.css' %}">

</head>

<body>

<div class="container">

    <h2>Advance Collection Form</h2>


    <p>
        UID, Customer Name, Block,
        Area and Case ID are prefilled.
        Do Not Edit.
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Email *</label>

        <input type="email"
               name="email"
               placeholder="Enter Customer Email"
               required>

        <label>UID *</label>

        <input type="text"
               value="{{ customer.id }}"
               readonly>

        <label>Customer Name *</label>

        <input type="text"
               value="{{ customer.name }}"
               readonly>

        <label>Block *</label>

        <input type="text"
               value="{{ customer.tower }}"
               readonly>

        <label>Area *</label>

        <input type="text"
               value="{{ customer.area }}"
               readonly>

        <label>Case ID *</label>

        <input type="text"
               value="{{ customer.ticket_id }}"
               readonly>

        <hr>

        <label>Advance Collected *</label>

        <input type="number"
               name="advance_collected"
               step="0.01"
               required>

        <label>Collected By *</label>

        <input type="text"
               name="collected_by"
               placeholder="Person who collected amount"
               required>

        <p class="note">
            Person who has collected amount from customer from our side.
        </p>

        <button type="submit">

            Submit

        </button>

    </form>

</div>

{% if popup_message %}

<script>

alert("{{ popup_message }}");

window.location.href = window.location.pathname;

</script>

{% endif %}

</body>

</html>
