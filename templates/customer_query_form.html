{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Customer Query Form</title>

    <link rel="stylesheet" href="{% static 'css/customer_form.css' %}">

    {% if success %}
    <meta http-equiv="refresh" content="3;url=/customer-form/">
    {% endif %}
</head>

<body>

<div class="container">

    <!-- LOGO (optional, hata bhi sakti ho) -->
    <div class="logo-box">
        <img src="{% static 'images/ticket_logo.JPG' %}" alt="Logo">
    </div>

    <h2>Customer Query Form</h2>

    <form method="POST" enctype="multipart/form-data" action="{% url 'customer_form' %}">
        {% csrf_token %}

        <label>Email *</label>
        <input type="email" name="email" required>

        <label>Customer Name *</label>
        <input type="text" name="name" required>

        <label>Contact Number *</label>
        <input type="text" name="contact" placeholder="Without +91" required>

        <label>WhatsApp Number</label>
        <input type="text" name="whatsapp">

        <label>Block *</label>
        <input type="text" name="block" required>

        <label>Flat / Location *</label>
        <input type="text" name="flat" required>

        <label>Tower *</label>
        <select name="tower" required>
            <option value="">Select</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
            <option>Non Tower</option>
            <option>Amenities</option>
        </select>

        <label>Area *</label>
        <select name="area" required>
            <option value="">Select</option>
            <option>STP Area</option>
            <option>Parking Area</option>
            <option>Temple Area</option>
            <option>Club House</option>
        </select>

        <label>Issue Related With *</label>
        <select name="issue" required>
            <option value="">Select</option>
            <option>Civil</option>
            <option>Plumbing</option>
            <option>Waterproofing</option>
            <option>Door and Windows</option>
            <option>Flooring</option>
            <option>Maintenance Sampoorna</option>
        </select>

        <label>Problem Facing *</label>
        <textarea name="problem" required></textarea>

        <!-- FILE OPTIONAL (agar nahi chahiye to hata do) -->
        <label>Upload Photo</label>
        <input type="file" name="photo">

        <button type="submit">Submit</button>
    </form>

</div>

<!-- SUCCESS POPUP -->
{% if success %}
<div class="popup-overlay">
    <div class="popup-box">
        <h3>Submitted Successfully!</h3>
        <p>Your query has been received.</p>
    </div>
</div>
{% endif %}

</body>
</html>
