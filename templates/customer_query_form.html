{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Query Form</title>

    <link rel="stylesheet"
          href="{% static 'css/customer_form.css' %}">

</head>

<body>

<div class="container">

    <!-- LOGO -->

    <div class="logo-box">

        <img src="{% static 'images/maintain.PNG' %}"
             alt="Logo">

    </div>

    <!-- TITLE -->

    <h2>Customer Query Form</h2>

    <!-- FORM -->

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <!-- EMAIL -->

        <label>Email *</label>

        <input type="email"
               name="email"
               required>

        <!-- NAME -->

        <label>Customer Name *</label>

        <input type="text"
               name="name"
               required>

        <!-- CONTACT -->

        <label>Contact Number *</label>

        <p class="info-text">

            Please enter your WhatsApp number so that updates can be sent through WhatsApp.
            <br>

            Mobile number should be entered without country code.
            <br>

            Make sure there should not be any blank space in mobile number.

        </p>

        <input type="text"
               name="contact"
               maxlength="10"
               pattern="[0-9]{10}"
               required>

        <!-- WHATSAPP -->

        <label>WhatsApp Number</label>

        <input type="text"
               name="whatsapp"
               maxlength="10"
               pattern="[0-9]{10}">

        <!-- BLOCK -->

        <label>Block *</label>

        <select name="tower"
                id="tower"
                onchange="toggleTowerOther()"
                required>

            <option value="">Select Block</option>

            <option value="A">A</option>

            <option value="B">B</option>

            <option value="C">C</option>

            <option value="D">D</option>

            <option value="Non Tower">Non Tower</option>

            <option value="Amenities">Amenities</option>

            <option value="Other">Other</option>

        </select>

        <!-- OTHER TOWER -->

        <input type="text"
               name="other_tower"
               id="other_tower"
               placeholder="Enter Other Block"
               style="display:none;">

        <!-- AREA -->

        <label>Flat / Location *</label>

        <select name="area"
                id="area"
                onchange="toggleAreaOther()"
                required>

            <option value="">Select Area</option>

            <option value="STP Area">STP Area</option>

            <option value="Parking Area">Parking Area</option>

            <option value="Temple Area">Temple Area</option>

            <option value="Club House">Club House</option>

            <option value="Other">Other</option>

        </select>

        <!-- OTHER AREA -->

        <input type="text"
               name="other_area"
               id="other_area"
               placeholder="Enter Other Area"
               style="display:none;">

        <!-- ISSUE -->

        <label>Issue Related With *</label>

        <select name="issue"
                id="issue"
                onchange="toggleIssueOther()"
                required>

            <option value="">Select Issue</option>

            <option value="Civil Work">Civil Work</option>

            <option value="Plumbing Work">Plumbing Work</option>

            <option value="Waterproofing Work">Waterproofing Work</option>

            <option value="Door and Windows">Door and Windows</option>

            <option value="Flooring Work">Flooring Work</option>

            <option value="Painting Work">Painting Work</option>

            <option value="Electrical Work">Electrical Work</option>

            <option value="Other">Other</option>

        </select>

        <!-- OTHER ISSUE -->

        <input type="text"
               name="other_issue"
               id="other_issue"
               placeholder="Enter Other Issue"
               style="display:none;">

        <!-- PROBLEM -->

        <label>Problem Facing *</label>

        <textarea name="problem"
                  rows="5"
                  required></textarea>

        <!-- PHOTO -->

        <label>Upload Photo</label>

        <input type="file"
               name="photo"
               accept="image/*">

        <!-- BUTTON -->

        <button type="submit">

            Submit

        </button>

    </form>

</div>

<!-- JAVASCRIPT -->

<script>

    function toggleTowerOther() {

        let tower = document.getElementById("tower");

        let otherTower = document.getElementById("other_tower");

        if (tower.value === "Other") {

            otherTower.style.display = "block";

        }

        else {

            otherTower.style.display = "none";

            otherTower.value = "";

        }
    }

    function toggleAreaOther() {

        let area = document.getElementById("area");

        let otherArea = document.getElementById("other_area");

        if (area.value === "Other") {

            otherArea.style.display = "block";

        }

        else {

            otherArea.style.display = "none";

            otherArea.value = "";

        }
    }

    function toggleIssueOther() {

        let issue = document.getElementById("issue");

        let otherIssue = document.getElementById("other_issue");

        if (issue.value === "Other") {

            otherIssue.style.display = "block";

        }

        else {

            otherIssue.style.display = "none";

            otherIssue.value = "";

        }
    }

</script>

</body>
</html>
