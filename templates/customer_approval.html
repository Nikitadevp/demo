{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Approval Form</title>

    <link rel="stylesheet"
          href="{% static 'css/customer_approval.css' %}">

</head>

<body>

<div class="container">

    <h2>Customer Approval Form</h2>

    <p>
        UID, Customer Name, Block,
        Area and Case ID are prefilled.
        Do Not Edit.
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Email *</label>

        <input type="email"
               name="email"
               placeholder="Enter Email Address"
               required>

        <label>UID *</label>

        <input type="text"
               value="{{ customer.id }}"
               readonly>

        <label>Customer Name *</label>

        <input type="text"
               value="{{ customer.name }}"
               readonly>

        <label>Block *</label>

        <input type="text"
               value="{{ customer.tower }}"
               readonly>

        <label>Area *</label>

        <input type="text"
               value="{{ customer.area }}"
               readonly>

        <label>Case ID *</label>

        <input type="text"
               value="{{ customer.ticket_id }}"
               readonly>

        <hr>

        <label>
            Provide Customer's Decision Below
        </label>

        <div class="radio-group">

            <label>
                <input type="radio"
                       name="approval_type"
                       value="Approve"
                       required>
                Approve
            </label>

            <label>
                <input type="radio"
                       name="approval_type"
                       value="Reject">
                Reject
            </label>

        </div>

        <label>Customer Remark *</label>

        <textarea name="customer_remark"
                  rows="5"
                  required></textarea>

        <button type="submit">
            Submit
        </button>

    </form>

</div>

{% if popup_message %}

<script>

alert("{{ popup_message }}");

window.location.href = "/";

</script>

{% endif %}

</body>

</html>
