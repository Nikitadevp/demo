{% load static %}
{% load tz %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Leave Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/admin_leave_dashboard.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Header -->
    <div class="header">
        <h1><i class="fa fa-user-shield"></i> Admin Leave Dashboard</h1>
        <p>Manage all employee leave requests in one place</p>
    </div>

    <!-- Search + Filters -->
    <form method="get" class="filters">
        <input type="hidden" name="key" value="admin123">

        <input type="text" name="search" value="{{ search }}"
               placeholder="🔍 Search Leave ID / Name / Email">

        <select name="department" onchange="this.form.submit()">
            <option value="">All Departments</option>
            <option value="DME" {% if department == "DME" %}selected{% endif %}>DME</option>
            <option value="HR" {% if department == "HR" %}selected{% endif %}>HR</option>
            <option value="IT" {% if department == "IT" %}selected{% endif %}>IT</option>
        </select>

        <select name="status" onchange="this.form.submit()">
            <option value="">All Status</option>
            <option value="Pending" {% if status == "Pending" %}selected{% endif %}>Pending</option>
            <option value="Approved" {% if status == "Approved" %}selected{% endif %}>Approved</option>
            <option value="Rejected" {% if status == "Rejected" %}selected{% endif %}>Rejected</option>
        </select>

        <input type="date" name="from_date" value="{{ from_date }}" onchange="this.form.submit()">
        <input type="date" name="to_date" value="{{ to_date }}" onchange="this.form.submit()">
    </form>

    <!-- Stats Cards -->
    <div class="cards">
        <div class="card total">
            <i class="fa fa-file"></i>
            <span>Total Leaves</span>
</html>
