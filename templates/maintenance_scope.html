{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Maintenance Scope Form</title>

    <link rel="stylesheet"
          href="{% static 'css/maintenance_scope.css' %}">

    {% if popup_message %}
    <meta http-equiv="refresh"
          content="3;url=/">
    {% endif %}

</head>

<body>

<div class="container">

    <h2>PHM SH Scope Form</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Email</label>
        <input type="email"
               value="{{ customer.email }}"
               readonly>

        <label>UID</label>
        <input type="text"
               value="{{ customer.id }}"
               readonly>

        <label>Case ID</label>
        <input type="text"
               value="{{ customer.ticket_id }}"
               readonly>

        <label>Customer Name</label>
        <input type="text"
               value="{{ customer.name }}"
               readonly>

        <label>Customer Contact</label>
        <input type="text"
               value="{{ customer.contact }}"
               readonly>

        <label>Block</label>
        <input type="text"
               value="{{ customer.tower }}"
               readonly>

        <label>Location</label>
        <input type="text"
               value="{{ customer.area }}"
               readonly>

        <label>Issue Related With</label>
        <input type="text"
               value="{{ customer.issue }}"
               readonly>

        <label>Issue Description</label>
        <textarea readonly>{{ customer.problem }}</textarea>

        <h3>Update the Scope</h3>

        <p>
            Update whether the raised issue comes under our scope or not
        </p>

        <label>
            Is it comes under maintenance Scope?
        </label>

        <div class="radio-group">

            <label>
                <input type="radio"
                       name="scope_status"
                       value="Yes"
                       required>
                Yes
            </label>

            <label>
                <input type="radio"
                       name="scope_status"
                       value="No">
                No
            </label>

        </div>

        <!-- REASON BOX -->

        <div id="reasonBox"
             style="display:none; margin-top:15px;">

            <label>Reason for No</label>

            <textarea
                name="reason"
                id="reason"
                rows="4"
                placeholder="Enter reason why this issue is not under maintenance scope">
            </textarea>

        </div>

        <button type="submit">
            Submit
        </button>

    </form>

</div>

<!-- SUCCESS POPUP -->

{% if popup_message %}

<div class="popup-overlay">

    <div class="popup-box">

        <h3>Submitted Successfully</h3>

        <p>

            {{ popup_message }}

            <br><br>

            Redirecting...

        </p>

    </div>

</div>

{% endif %}

<script>

document.addEventListener("DOMContentLoaded", function() {

    const yesRadio = document.querySelector('input[value="Yes"]');
    const noRadio = document.querySelector('input[value="No"]');

    const reasonBox = document.getElementById("reasonBox");
    const reasonField = document.getElementById("reason");

    yesRadio.addEventListener("change", function() {

        reasonBox.style.display = "none";
        reasonField.required = false;
        reasonField.value = "";

    });

    noRadio.addEventListener("change", function() {

        reasonBox.style.display = "block";
        reasonField.required = true;

    });

});

</script>

</body>
</html>
