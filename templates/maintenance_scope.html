{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Maintenance Scope Form</title>

    <link rel="stylesheet"
          href="{% static 'css/maintenance_scope.css' %}">

</head>

<body>

<div class="container">

    <h2>Maintenance Scope Form</h2>

    <form method="POST">

        {% csrf_token %}

        <!-- EMAIL -->

        <label>Email</label>

        <input type="email"
               value="jrdme.rbpl@rajat-group.com"
               readonly>

        <!-- UID -->

        <label>UID</label>

        <input type="text"
               value="{{ customer.id }}"
               readonly>

        <!-- CASE ID -->

        <label>Case ID</label>

        <input type="text"
               value="{{ customer.ticket_id }}"
               readonly>

        <!-- CUSTOMER NAME -->

        <label>Customer Name</label>

        <input type="text"
               value="{{ customer.name }}"
               readonly>

        <!-- CUSTOMER CONTACT -->

        <label>Customer Contact</label>

        <input type="text"
               value="{{ customer.contact }}"
               readonly>

        <!-- WHATSAPP -->

        <label>WhatsApp Number</label>

        <input type="text"
               value="{{ customer.whatsapp }}"
               readonly>

        <!-- BLOCK -->

        <label>Block</label>

        <input type="text"
               value="{% if customer.other_tower %}{{ customer.other_tower }}{% else %}{{ customer.tower }}{% endif %}"
               readonly>

        <!-- LOCATION -->

        <label>Location</label>

        <input type="text"
               value="{{ customer.tower }} - {{ customer.area }} - {{ customer.flat }}"
               readonly>

        <!-- ISSUE -->

        <label>Issue Related With</label>

        <input type="text"
               value="{% if customer.other_issue %}{{ customer.other_issue }}{% else %}{{ customer.issue }}{% endif %}"
               readonly>

        <!-- DESCRIPTION -->

        <label>Issue Description</label>

        <textarea readonly>{{ customer.problem }}</textarea>

        <!-- PHOTO -->

        {% if customer.photo %}

        <label>Uploaded Photo</label>

        <div class="photo-preview">

            <img src="{{ customer.photo.url }}"
                 alt="Customer Photo">

        </div>

        {% endif %}

        <hr>

        <!-- SCOPE -->

        <h3>Update the Scope</h3>

        <p>
            Update whether the raised issue comes under our maintenance scope or not.
        </p>

        <label>
            Is it comes under maintenance Scope?
        </label>

        <div class="radio-group">

            <label>

                <input type="radio"
                       name="scope_status"
                       value="Yes"
                       required>

                Yes

            </label>

            <label>

                <input type="radio"
                       name="scope_status"
                       value="No">

                No

            </label>

        </div>

        <button type="submit">

            Submit

        </button>

    </form>

</div>

</body>

</html>
